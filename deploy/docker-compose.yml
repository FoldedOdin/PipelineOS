# Run from repo root: docker compose -f deploy/docker-compose.yml --project-directory . up --build
# (Makefile sets --project-directory so paths below resolve to the repository root.)

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3001:3001"
    env_file: ./deploy/.env
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules

  runner:
    build:
      context: .
      dockerfile: runner/Dockerfile
    env_file: ./deploy/.env
    depends_on:
      - api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runner:/app
      - /app/node_modules

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    env_file: ./deploy/.env
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
